name: daidai_app
description: "呆呆面板 Flutter 客户端"
publish_to: 'none'
version: 0.0.60

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  go_router: ^14.8.1
  dio: ^5.7.0
  http: ^1.2.2
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  crypto: ^3.0.6
  fl_chart: ^0.70.2
  permission_handler: ^12.0.0
  flutter_local_notifications: ^18.0.1
  file_picker: ^10.3.0
  intl: ^0.19.0
  logger: ^2.5.0
  device_info_plus: ^11.2.2
  package_info_plus: ^8.3.1
  path_provider: ^2.1.5
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

