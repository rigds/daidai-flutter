name: Build Android Kotlin

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-new
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Build APK
        run: ./gradlew assembleRelease
      
      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | awk -F'"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Rename APK
        run: |
          find . -name "*.apk" -type f | head -5
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" daidai-panel-v${{ steps.version.outputs.VERSION }}-android.apk
          else
            echo "APK not found"
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android-new/daidai-panel-v${{ steps.version.outputs.VERSION }}-android.apk
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-files
      
      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' android-new/app/build.gradle.kts | head -1 | awk -F'"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_TAG=v${VERSION}" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate Release Notes
        id: release_notes
        run: |
          RELEASE_TAG="${{ steps.version.outputs.RELEASE_TAG }}"
          if [ -f "docs/release-notes/${RELEASE_TAG}.md" ]; then
            echo "file=docs/release-notes/${RELEASE_TAG}.md" >> "$GITHUB_OUTPUT"
          else
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
            else
              CHANGES=$(git log --pretty=format:"- %s" --no-merges -10)
            fi
            cat > /tmp/release_notes.md << EOF
          ## 呆呆面板 ${{ steps.version.outputs.RELEASE_TAG }}
          
          ### 更新内容
          $CHANGES
          
          ### 下载说明
          - **Android**: 下载 APK 文件安装使用
          EOF
            echo "file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE="${{ steps.release_notes.outputs.file }}"
          RELEASE_TAG="${{ steps.version.outputs.RELEASE_TAG }}"
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "v${{ steps.version.outputs.VERSION }}" \
              --notes-file "$NOTES_FILE"
            gh release upload "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              release-files/* \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "v${{ steps.version.outputs.VERSION }}" \
              --notes-file "$NOTES_FILE" \
              release-files/*
          fi
